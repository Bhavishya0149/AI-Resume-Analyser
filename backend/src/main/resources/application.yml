server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGO_URI}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

  resume:
    max-count: 5
    max-size-bytes: 5242880

  temp-input:
    max-size-bytes: 100000

  otp:
    expiry-minutes: 10
    max-attempts: 5
    resend-delay-seconds: 60

  leaderboard:
    max-user-entries: 100

  google:
    client-id: ${GOOGLE_CLIENT_ID}

  profile-picture:
    max-size-bytes: 2097152

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}